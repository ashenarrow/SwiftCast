name: SwiftCast
options:
  bundleIdPrefix: com.swiftcast
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
packages: {}
targets:
  SwiftCast:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
      - path: ../web/dist
        optional: true
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.swiftcast.app
      INFOPLIST_FILE: App/Info.plist
      CODE_SIGN_ENTITLEMENTS: App/SwiftCast.entitlements
    dependencies:
      - target: SwiftCastBroadcast
    preBuildScripts:
      - name: Build Chrome Client
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/../web"
          if [ ! -d node_modules ]; then npm install; fi
          npm run build
  SwiftCastBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - BroadcastExtension
      - Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.swiftcast.app.broadcast
      INFOPLIST_FILE: BroadcastExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: BroadcastExtension/SwiftCastBroadcast.entitlements
      APPLICATION_EXTENSION_API_ONLY: true


name: iOS

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "web/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - "web/**"
      - ".github/workflows/ios.yml"

jobs:
  build:
    name: Build iOS app and broadcast extension
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Chrome client
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install iOS tooling
        run: |
          brew update
          brew install xcodegen
          sudo gem install cocoapods --no-document

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build unsigned Debug app
        working-directory: ios
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -workspace SwiftCast.xcworkspace \
            -scheme SwiftCast \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/SwiftCast.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build/xcodebuild.log

      - name: Package unsigned IPA and app bundle
        working-directory: ios
        run: |
          set -euo pipefail
          ARTIFACT_DIR="build/artifacts"
          PRODUCTS_DIR="build/DerivedData/Build/Products/Debug-iphoneos"
          APP_PATH="$PRODUCTS_DIR/SwiftCast.app"

          test -d "$APP_PATH"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR/Payload"

          ditto "$APP_PATH" "$ARTIFACT_DIR/Payload/SwiftCast.app"
          ditto -c -k --sequesterRsrc --keepParent "$ARTIFACT_DIR/Payload" "$ARTIFACT_DIR/SwiftCast-unsigned.ipa"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARTIFACT_DIR/SwiftCast.app.zip"

          DSYM_DIRS=$(find "$PRODUCTS_DIR" -maxdepth 1 -name "*.dSYM" -type d -print || true)
          if [ -n "$DSYM_DIRS" ]; then
            mkdir -p "$ARTIFACT_DIR/dSYMs"
            while IFS= read -r dsym; do
              [ -n "$dsym" ] && ditto "$dsym" "$ARTIFACT_DIR/dSYMs/$(basename "$dsym")"
            done <<< "$DSYM_DIRS"
            ditto -c -k --sequesterRsrc --keepParent "$ARTIFACT_DIR/dSYMs" "$ARTIFACT_DIR/SwiftCast-dSYMs.zip"
          fi

          ls -lah "$ARTIFACT_DIR"

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swiftcast-ios-debug-unsigned
          path: |
            ios/build/artifacts/SwiftCast-unsigned.ipa
            ios/build/artifacts/SwiftCast.app.zip
            ios/build/artifacts/SwiftCast-dSYMs.zip
            ios/build/xcodebuild.log
          if-no-files-found: error
          retention-days: 14

      - name: Print compiler diagnostics on failure
        if: failure()
        working-directory: ios
        run: |
          echo "---- Swift errors ----"
          grep -n -E "error:|warning:|BUILD FAILED|The following build commands failed" build/xcodebuild.log || true
          echo "---- Result bundle ----"
          xcrun xcresulttool get --legacy --format json --path build/SwiftCast.xcresult > build/SwiftCast.xcresult.json || true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-diagnostics
          path: |
            ios/build/xcodebuild.log
            ios/build/SwiftCast.xcresult
            ios/build/SwiftCast.xcresult.json
            ios/Pods/Manifest.lock
            ios/SwiftCast.xcodeproj
            ios/SwiftCast.xcworkspace
          if-no-files-found: ignore
